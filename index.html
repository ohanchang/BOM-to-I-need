<body>
<div class="container">
  <header>
    <div class="theme-toggle-container">
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="切換主題">
        <span class="theme-icon-dark">🌙</span>
        <span class="theme-icon-light">☀️</span>
      </button>
    </div>
    <h1>BOM to I need</h1>
    <p>批次格式整理、偏移修正與物料拆解分頁重構工具 (v1.4)</p>
  </header>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="stat-card total">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">載入檔案總數</div>
    </div>
    <div class="stat-card processed">
      <div class="stat-num id" id="statProcessed">0</div>
      <div class="stat-label">已整理/略過</div>
    </div>
    <div class="stat-card fixed">
      <div class="stat-num" id="statFixed">0</div>
      <div class="stat-label">已修正偏移</div>
    </div>
    <div class="stat-card normal">
      <div class="stat-num" id="statNormal">0</div>
      <div class="stat-label">原始BOM格式正常</div>
    </div>
    <div class="stat-card error">
      <div class="stat-num" id="statError">0</div>
      <div class="stat-label">異常/讀取失敗</div>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="settings-group">
      <div class="setting-item">
        <label for="exchangeRate">全域美金匯率</label>
        <input type="number" id="exchangeRate" class="input-text" step="0.01" min="0.01" value="30.00">
      </div>
      <label class="checkbox-group">
        <input type="checkbox" id="skipProcessed" checked>
        <span>略過已整理的 BOM 檔案 (不加入壓縮包)</span>
      </label>
    </div>
    <div class="button-group">
      <button class="btn btn-secondary" id="btnClear" disabled>清空清單</button>
      <button class="btn btn-primary" id="btnDownload" disabled>一鍵打包下載 (ZIP)</button>
    </div>
  </div>

  <!-- Upload Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📤</div>
    <div class="drop-text">拖放複數個 BOM 檔案至此，或點擊選取檔案，將執行BOM表格式修正、價格計算、用料比例分析、缺料對比。</div>
    <div class="drop-subtext">支援 Excel (.xls, .xlsx) 格式</div>
    <input type="file" id="fileInput" multiple accept=".xls, .xlsx, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
  </div>

  <!-- Progress Bar -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Results Section -->
  <div class="section-title">
    <span class="section-title-text">📋 處理檔案清單</span>
    <button class="btn-apply-all" id="btnApplyAll" onclick="applyAllRecommendations()" style="display:none">
      ⚡ 一鍵套用推薦單價
    </button>
  </div>
  <div class="file-list" id="fileList"></div>
</div>

<script>
/* ======== GLOBAL STATE ======== */
let results = []; // Store results of processed files
let priceOverrides = {}; // { filename: { partNo: price } }

/* ======== SMART PRICE RECOMMENDATION & OVERRIDES ======== */
function findRecommendation(partNo, currentFilename) {
  if (!partNo) return null;
  const p = partNo.trim().toUpperCase();
  if (p.length < 5) return null;

  let bestMatch = null;
  let bestScore = 0; // Length of matching prefix

  for (const r of results) {
    if (!r.bomData || r.bomData.length === 0) continue;
    
    for (const item of r.bomData) {
      if (!item.partNo) continue;
      const otherP = item.partNo.trim().toUpperCase();
      if (item.price <= 0) continue;

      // Exact match gets highest priority
      if (otherP === p) {
        return {
          price: item.price,
          partNo: item.partNo,
          filename: r.filename,
          type: 'exact'
        };
      }

      // Calculate common prefix length
      let commonLen = 0;
      const minLen = Math.min(p.length, otherP.length);
      for (let i = 0; i < minLen; i++) {
        if (p[i] === otherP[i]) {
          commonLen++;
        } else {
          break;
        }
      }

      // Prefix match length >= 5
      if (commonLen >= 5 && commonLen > bestScore) {
        bestScore = commonLen;
        bestMatch = {
          price: item.price,
          partNo: item.partNo,
          filename: r.filename,
          type: 'similar',
          score: commonLen
        };
      }
    }
  }

  return bestMatch;
}

function setPriceOverride(fileIdx, partNo, val) {
  const r = results[fileIdx];
  if (!r) return;
  const filename = r.filename;
  if (!priceOverrides[filename]) {
    priceOverrides[filename] = {};
  }
  const numVal = parseFloat(val);
  if (isNaN(numVal) || numVal < 0) {
    delete priceOverrides[filename][partNo];
  } else {
    priceOverrides[filename][partNo] = numVal;
  }
  recalculateAll();
}

function recalculateAll() {
  const rateValue = parseFloat(exchangeRateInput.value) || 30.0;
  
  // Save expand & tab states
  const expandedState = {};
  const activeTabState = {};
  results.forEach((_, idx) => {
    const detail = document.getElementById(`detail-${idx}`);
    if (detail) {
      expandedState[idx] = !detail.classList.contains('hidden');
      const tabs = detail.querySelectorAll('.card-tab');
      for (const tab of tabs) {
        if (tab.classList.contains('active')) {
          const onClickStr = tab.getAttribute('onclick') || '';
          const parts = onClickStr.split("'");
          if (parts.length >= 6) {
            activeTabState[idx] = parts[5];
          }
          break;
        }
      }
    }
  });

  // Re-process all workbooks using originalData
  results = results.map(r => {
    if (r.status === 'error' || !r.originalData) return r;
    try {
      const wb = XLSX.read(r.originalData, { type: 'array' });
      const newResult = processBOMWorkbook(wb, r.filename, rateValue);
      newResult.originalData = r.originalData; // preserve raw data
      return newResult;
    } catch (err) {
      r.issues = ['重新計算失敗: ' + err.message];
      return r;
    }
  });

  updateDashboard();
  renderResults();

  // Restore states
  results.forEach((_, idx) => {
    const detailId = `detail-${idx}`;
    const detail = document.getElementById(detailId);
    if (detail && expandedState[idx]) {
      detail.classList.remove('hidden');
      const btn = detail.previousElementSibling;
      if (btn && btn.classList.contains('detail-toggle')) {
        btn.textContent = '▼ 收合整理明細與網頁預覽';
      }
      
      const tabName = activeTabState[idx] || 'bom';
      const tabBtn = Array.from(detail.querySelectorAll('.card-tab')).find(btn => btn.getAttribute('onclick').includes(`'${tabName}'`));
      if (tabBtn) {
        switchCardTab({ currentTarget: tabBtn }, detailId, tabName);
      }
    }
  });
}

/* ======== FILE PROCESSING ======== */
function handleFileSelect(e) {
  if (e.target.files.length > 0) {
    processFiles(e.target.files);
  }
}

async function processFiles(files) {
  btnClear.disabled = true;
  btnDownload.disabled = true;
  progressContainer.style.display = 'block';
  progressBar.style.width = '0%';

  const rateValue = parseFloat(exchangeRateInput.value) || 30.0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    progressBar.style.width = ((i + 1) / files.length * 100) + '%';
    
    // Skip file test scripts or invalid files
    if (file.name === 'read_test.js' || file.name === 'verify.js') continue;

    try {
      const data = await readFileAsArrayBuffer(file);
      const wb = XLSX.read(data, { type: 'array' });
      const result = processBOMWorkbook(wb, file.name, rateValue);
      result.originalData = data;
      results.push(result);
    } catch (err) {
      results.push({
        filename: file.name,
        status: 'error',
        fixedWb: null,
        issues: ['讀取失敗: ' + err.message],
        fixLog: [],
        bomData: [],
        highLevelSummary: [],
        categoryBreakdown: []
      });
    }
  }

  updateDashboard();
  renderResults();
  progressContainer.style.display = 'none';
  btnClear.disabled = false;
  fileInput.value = '';
}

function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(new Uint8Array(e.target.result));
    reader.onerror = () => reject(new Error('FileReader error'));
    reader.readAsArrayBuffer(file);
  });
}

/* ======== DETECT AND PROCESS SINGLE WORKBOOK ======== */
function applyStylesToSheet(sheet, sheetType) {
  if (!sheet) return;
  const hasChinese = /[\u4e00-\u9fa5]/;
  for (const cellAddress in sheet) {
    if (cellAddress.startsWith('!')) continue;
    const cell = sheet[cellAddress];
    if (!cell) continue;

    // Determine font family
    let fontName = 'Arial';
    if (cell.v !== undefined && cell.v !== null && hasChinese.test(String(cell.v))) {
      fontName = 'Microsoft JhengHei';
    }

    let fontColor = '000000';
    let isBold = false;
    let fill = null;



    const match = cellAddress.match(/^([A-Z]+)([0-9]+)$/);
    if (match) {
      const colLetter = match[1];
      const rowNum = parseInt(match[2], 10);

      // Check header rows for bolding
      if (sheetType === 'BOM') {
        if (rowNum === 12) {
          isBold = true;
        }

        // Red and Bold formatting for E4, G4, L10 on BOM sheet
        if ((colLetter === 'E' && rowNum === 4) || 
            (colLetter === 'G' && rowNum === 4) || 
            (colLetter === 'L' && rowNum === 10)) {
          fontColor = 'FF0000';
          isBold = true;
        }

        // Color coding for data rows starting from row 13
        if (rowNum >= 13) {
          const partNoCell = sheet['C' + rowNum];
          const partNo = partNoCell && partNoCell.v ? String(partNoCell.v).trim().toUpperCase() : '';
          const descCell = sheet['D' + rowNum];
          const desc = descCell && descCell.v ? String(descCell.v).trim().toUpperCase() : '';

          const applyRowColor = ['C','D','E','F','G','H','I','J','K','L'].includes(colLetter);

          if (applyRowColor) {
            if (partNo.startsWith('8B')) {
              fontColor = 'A9A9A9';
            } else if (partNo.startsWith('4W')) {
              fontColor = '0000FF';
            } else if (partNo.startsWith('5CC') || partNo.startsWith('3FH') || partNo.startsWith('5OG')) {
              fontColor = 'FFA500';
            }
          }

          // Fill yellow for Column L if value is 0 (excluding 8B parts)
          if (colLetter === 'L') {
            const val = parseFloat(cell.v);
            if (val === 0 && !partNo.startsWith('8B')) {
              fill = {
                patternType: 'solid',
                fgColor: { rgb: 'FFFF00' }
              };
            }
          }
        }
      } else if (sheetType === 'HL' || sheetType === 'Breakdown') {
        if (rowNum === 1 || cell.v === 'Total') {
          isBold = true;
        }
      }
    }

    cell.s = {
      font: {
        name: fontName,
        sz: 10,
        bold: isBold,
        color: { rgb: fontColor }
      }
    };
    if (fill) {
      cell.s.fill = fill;
    }
  }
}

function processBOMWorkbook(wb, filename, defaultRate) {
  const sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  
  // Quick JSON read to inspect rows
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  
  // Try to find header row in the first sheet
  let headerRow = -1;
  for (let r = 0; r < Math.min(25, raw.length); r++) {
    const row = raw[r];
    if (row && String(row[0]).trim() === 'No' && String(row[1]).trim() === '階層' && String(row[2]).trim() === '料號') {
      headerRow = r;
      break;
    }
  }

  const findMetaRow = (rawRows, hRow, key) => {
    const normKey = key.replace(/[:：\s]/g, '').toLowerCase();
    for (let r = 0; r < hRow; r++) {
      const row = rawRows[r];
      if (!row || row.length === 0) continue;
      const firstCell = String(row[0] ?? '').replace(/[:：\s]/g, '').toLowerCase();
      if (firstCell === normKey || firstCell.startsWith(normKey)) {
        return row;
      }
    }
    return null;
  };

  let modelNumber = '';
  let version = '';
  const mRow = findMetaRow(raw, headerRow !== -1 ? headerRow : 11, '成品/半成品料號：');
  if (mRow) {
    modelNumber = String(mRow[1] || mRow[3] || '').trim();
  }
  const vRow = findMetaRow(raw, headerRow !== -1 ? headerRow : 11, 'BOM 版本：');
  if (vRow) {
    version = String(vRow[1] || vRow[3] || '').trim();
  }

  const hasHighLevelSheet = wb.SheetNames.includes('大分類統計');
  const hasCategorySheet = wb.SheetNames.includes('物料拆解分析');

  // If header found, check if column 11 (index 11) is already '乘積'
  const isL12Product = (headerRow !== -1 && raw[headerRow] && String(raw[headerRow][11]).trim() === '乘積');
  
  if (hasHighLevelSheet || hasCategorySheet || isL12Product) {
    // This BOM is already formatted. We extract BOM data for preview.
    const bomRows = [];
    const highLevelSum = {
      '1xxx 主動': 0.0, '2xxx 被動': 0.0, '3xxx 機電與保護': 0.0, '4xxx 連接器線材': 0.0,
      '5xxx 機構五金': 0.0, '6xxx 輔料與包材': 0.0, '7xxx 磁芯': 0.0, '8xxx 磁性元件': 0.0
    };
    const categoryBreakdown = {
      'DIODE': 0.0, 'IC': 0.0, 'MOS/ TR.': 0.0, 'CAP.': 0.0, 'DIP Res./Cap.': 0.0,
      'SMD Res./Cap.': 0.0, 'Magnetic': 0.0, 'PCB': 0.0, '機構件/ Other': 0.0,
      'FAN': 0.0, 'FAN GUARD': 0.0, 'CASE': 0.0, 'O/P WIRE': 0.0
    };
    let totalBOMCost = 0.0;

    if (headerRow !== -1) {
      const dataStart = headerRow + 1;
      for (let r = dataStart; r < raw.length; r++) {
        const row = raw[r];
        if (!row || row.length === 0) continue;
        const level = String(row[1] ?? '').trim();
        const partNo = String(row[2] ?? '').trim().toUpperCase();
        const desc = String(row[3] ?? '').trim().toUpperCase();
        const qty = parseFloat(row[5]) || 0;
        const overridePrice = typeof priceOverrides !== 'undefined' ? (priceOverrides[filename] || {})[partNo] : undefined;
        const price = overridePrice !== undefined ? overridePrice : (parseFloat(row[10]) || 0);
        const product = qty * price;

        if (overridePrice !== undefined) {
          const cellK = XLSX.utils.encode_cell({ r: r, c: 10 });
          const cellL = XLSX.utils.encode_cell({ r: r, c: 11 });
          if (!ws[cellK]) ws[cellK] = { t: 'n' };
          ws[cellK].v = price;
          ws[cellK].t = 'n';
          
          if (!ws[cellL]) ws[cellL] = { t: 'n' };
          ws[cellL].v = product;
          ws[cellL].t = 'n';
        }

        if (partNo === '' && level === '') continue; // Skip header/spacer rows

        let cat = '';
        if (level !== '') {
          totalBOMCost += product;

          // 1. High level categories
          const firstChar = partNo.charAt(0);
          const hlKey = firstChar === '1' ? '1xxx 主動' :
                        firstChar === '2' ? '2xxx 被動' :
                        firstChar === '3' ? '3xxx 機電與保護' :
                        firstChar === '4' ? '4xxx 連接器線材' :
                        firstChar === '5' ? '5xxx 機構五金' :
                        firstChar === '6' ? '6xxx 輔料與包材' :
                        firstChar === '7' ? '7xxx 磁芯' :
                        firstChar === '8' ? '8xxx 磁性元件' : null;
          if (hlKey) {
            highLevelSum[hlKey] += product;
          }

          // 2. 13-category breakdown
          cat = '機構件/ Other';
          if (partNo.startsWith('1D')) {
            cat = 'DIODE';
          } else if (partNo.startsWith('1I') || partNo.startsWith('1S') || partNo.startsWith('1OT')) {
            cat = 'IC';
          } else if (partNo.startsWith('1T') || partNo.startsWith('1M')) {
            cat = 'MOS/ TR.';
          } else if (partNo.startsWith('2E') && !partNo.startsWith('2EV') && !desc.includes('SMD')) {
            cat = 'CAP.';
          } else if (['2CX', '2CY', '2EV', '2FN', '2FS', '2OP', '2VR', '3RD', '3UC', '2R'].some(p => partNo.startsWith(p)) && !desc.includes('SMD')) {
            cat = 'DIP Res./Cap.';
          } else if (partNo.startsWith('2') && desc.includes('SMD')) {
            cat = 'SMD Res./Cap.';
          } else if ((partNo.startsWith('7') || partNo.startsWith('8')) && !partNo.startsWith('8B')) {
            cat = 'Magnetic';
          } else if (partNo.startsWith('3B') || partNo.startsWith('8B')) {
            cat = 'PCB';
          } else if (desc.includes('FAN') && !desc.includes('FAN GUARD') && !partNo.startsWith('1')) {
            cat = 'FAN';
          } else if (desc.includes('FAN GUARD')) {
            cat = 'FAN GUARD';
          } else if (desc.includes('CASE') || desc.includes('CHASSIS')) {
            cat = 'CASE';
          } else if ((partNo.startsWith('4W') || desc.includes('WIRE')) && !desc.includes('GUARD')) {
            cat = 'O/P WIRE';
          }
          categoryBreakdown[cat] += product;
        }

        let textClass = 'text-normal-row';
        if (partNo.startsWith('8BB') || (partNo.startsWith('8B') && desc.includes('ASSEMBLY'))) {
          textClass = 'text-muted-row';
        } else if (partNo.startsWith('4W')) {
          textClass = 'text-blue-row';
        } else if (['5CC', '3FH', '5OG'].some(p => partNo.startsWith(p))) {
          textClass = 'text-orange-row';
        }

        let bgClass = '';
        if (product === 0 && !partNo.startsWith('8BB') && !(partNo.startsWith('8B') && desc.includes('ASSEMBLY'))) {
          bgClass = 'bg-yellow-row';
        }

        bomRows.push({
          no: String(row[0] ?? '').trim(),
          level: level,
          partNo: partNo,
          desc: String(row[3] ?? '').trim(),
          uom: String(row[4] ?? '').trim(),
          qty: qty,
          location: String(row[6] ?? '').trim(),
          status: String(row[7] ?? '').trim(),
          lt: String(row[8] ?? '').trim(),
          safety: String(row[9] ?? '').trim(),
          price: price,
          product: product,
          asl: String(row[12] ?? '').trim(),
          quoteDate: String(row[13] ?? '').trim(),
          textClass,
          bgClass,
          category: cat || 'Other'
        });
      }
      if (priceOverrides[filename] && Object.keys(priceOverrides[filename]).length > 0) {
        const cellE4 = XLSX.utils.encode_cell({ r: 3, c: 4 });
        const cellG4 = XLSX.utils.encode_cell({ r: 3, c: 6 });
        const cellL10 = XLSX.utils.encode_cell({ r: 9, c: 11 });
        const rateVal = parseFloat(ws[XLSX.utils.encode_cell({ r: 2, c: 4 })]?.v) || defaultRate;
        if (ws[cellE4]) { ws[cellE4].v = totalBOMCost; ws[cellE4].t = 'n'; }
        if (ws[cellG4]) { ws[cellG4].v = totalBOMCost / rateVal; ws[cellG4].t = 'n'; }
        if (ws[cellL10]) { ws[cellL10].v = totalBOMCost; ws[cellL10].t = 'n'; }
        if (wb.SheetNames.includes('大分類統計')) {
          const s2 = wb.Sheets['大分類統計'];
          const keys = Object.keys(highLevelSum);
          keys.forEach((key, idx) => {
            const cellVal = s2[XLSX.utils.encode_cell({ r: idx + 1, c: 1 })];
            if (cellVal) { cellVal.v = highLevelSum[key]; cellVal.t = 'n'; }
          });
          const totalCell = s2[XLSX.utils.encode_cell({ r: 9, c: 1 })];
          if (totalCell) { totalCell.v = totalBOMCost; totalCell.t = 'n'; }
        }
        if (wb.SheetNames.includes('物料拆解分析')) {
          const s3 = wb.Sheets['物料拆解分析'];
          const keys = Object.keys(categoryBreakdown);
          keys.forEach((key, idx) => {
            const cellVal = s3[XLSX.utils.encode_cell({ r: idx + 1, c: 1 })];
            if (cellVal) { cellVal.v = categoryBreakdown[key]; cellVal.t = 'n'; }
          });
          const totalCell = s3[XLSX.utils.encode_cell({ r: 14, c: 1 })];
          if (totalCell) { totalCell.v = totalBOMCost; totalCell.t = 'n'; }
        }
      }
    }
    return {
      filename,
      status: 'processed',
      fixedWb: wb,
      issues: ['此檔案已是整理過後的 BOM 規格'],
      fixLog: [],
      bomData: bomRows,
      highLevelSummary: highLevelSum,
      categoryBreakdown: categoryBreakdown,
      totalBOMCost: totalBOMCost,
      modelNumber,
      version
    };
  }

  // If header row not found in raw BOM, it's an error
  if (headerRow === -1) {
    return {
      filename,
      status: 'error',
      fixedWb: null,
      issues: ['找不到標準標題列 (No/階層/料號)，無法解析。'],
      fixLog: [],
      bomData: [],
      highLevelSummary: [],
      categoryBreakdown: []
    };
  }

  // 2. Formatting & Alignment checks
  const issues = [];
  const fixLog = [];
  let needsFix = false;

  if (headerRow !== STANDARD_HEADER_ROW) {
    issues.push(`標題列位置偏移：Row ${headerRow} → 應為 Row ${STANDARD_HEADER_ROW}`);
    needsFix = true;
  }

  const maxCols = raw.reduce((m, r) => Math.max(m, r.length), 0);
  if (maxCols > STANDARD_COL_COUNT) {
    issues.push(`欄位數異常：${maxCols} 欄 → 標準為 ${STANDARD_COL_COUNT} 欄`);
    needsFix = true;
  }

  // Shifted sub-item rows check (Col 11-14 shifted instead of Col 9-12)
  const dataStart = headerRow + 1;
  let shiftedCount = 0;
  const shiftedRows = [];

  for (let r = dataStart; r < raw.length; r++) {
    const row = raw[r];
    if (!row || row.length === 0) continue;
    const noVal = String(row[0]).trim();
    if (!noVal) continue; // Skip spacer or description-only rows if no number

    const col9 = String(row[9] ?? '').trim();
    const col10 = String(row[10] ?? '').trim();
    const col11 = String(row[11] ?? '').trim();

    if (col9 === '' && col10 === '' && col11 !== '' && row.length > 13) {
      shiftedCount++;
      shiftedRows.push(r);
    }
  }

  if (shiftedCount > 0) {
    issues.push(`發現 ${shiftedCount} 筆子料行欄位偏移 (已自動修正搬移)`);
    needsFix = true;
  }

  // ===== FIX ALIGNMENT =====
  const fixed = raw.map(r => [...r]);

  // Fix shifted rows
  for (const r of shiftedRows) {
    const row = fixed[r];
    const before = `是否為安規料=[${row[9]}] 單價=[${row[10]}] ASL=[${row[11]}] 報價日=[${row[12]}]`;
    row[9] = row[11];
    row[10] = row[12];
    row[11] = row[13] ?? '';
    row[12] = row[14] ?? '';
    const after = `是否為安規料=[${row[9]}] 單價=[${row[10]}] ASL=[${row[11]}] 報價日=[${row[12]}]`;
    fixLog.push({ row: r, partNo: String(row[2]), before, after });
  }

  // Trim rows to standard width
  for (let r = 0; r < fixed.length; r++) {
    fixed[r] = fixed[r].slice(0, STANDARD_COL_COUNT);
  }

  // Rebuild metadata layout at Row 3-9

  const dataRows = fixed.slice(dataStart);
  const rebuilt = [];

  // Rows 0-2: empty
  for (let i = 0; i < 3; i++) {
    rebuilt.push(new Array(STANDARD_COL_COUNT).fill(''));
  }

  // Rows 3-9: metadata
  const META_KEYS = [
    '成品/半成品料號：',
    'BOM 版本：',
    'Change NO：',
    'BOM Cost：',
    '構成總筆數：',
    'UOM：',
    '品名規格：'
  ];

  for (const key of META_KEYS) {
    const foundRow = findMetaRow(fixed, headerRow, key);
    if (foundRow) {
      const sliced = foundRow.slice(0, STANDARD_COL_COUNT);
      while (sliced.length < STANDARD_COL_COUNT) sliced.push('');
      if (key === 'BOM 版本：' || key === 'Change NO：') {
        const val = (sliced[3] !== '' ? sliced[3] : sliced[1]) || '';
        sliced[3] = val;
        sliced[1] = '';
      } else {
        const val = (sliced[1] !== '' ? sliced[1] : sliced[3]) || '';
        sliced[1] = val;
        sliced[3] = '';
      }
      rebuilt.push(sliced);
    } else {
      const defaultRow = new Array(STANDARD_COL_COUNT).fill('');
      defaultRow[0] = key;
      rebuilt.push(defaultRow);
    }
  }

  // Row 10: spacer row
  rebuilt.push(new Array(STANDARD_COL_COUNT).fill(''));

  // Row 11: Standard header row
  rebuilt.push([...STANDARD_HEADERS]);

  // Row 12+: Data rows
  for (const dr of dataRows) {
    const hasAnyData = dr.some(c => String(c ?? '').trim() !== '');
    if (hasAnyData) {
      const sliced = dr.slice(0, STANDARD_COL_COUNT);
      while (sliced.length < STANDARD_COL_COUNT) sliced.push('');
      rebuilt.push(sliced);
    }
  }

  if (headerRow !== STANDARD_HEADER_ROW) {
    fixLog.unshift({ row: '-', partNo: '-', before: `標題列在 Row ${headerRow}`, after: `標題列對齊至 Row ${STANDARD_HEADER_ROW}` });
  }

  // ===== RETRIEVE EXCHANGE RATE =====
  // Check if "Ctrl Q" sheet has a rate
  let rate = defaultRate;
  if (wb.SheetNames.includes('Ctrl Q')) {
    const ctrlQSheet = wb.Sheets['Ctrl Q'];
    const ctrlQRaw = XLSX.utils.sheet_to_json(ctrlQSheet, { header: 1, defval: '' });
    if (ctrlQRaw && ctrlQRaw[5] && ctrlQRaw[5][0] !== '') {
      const parsedRate = parseFloat(ctrlQRaw[5][0]);
      if (!isNaN(parsedRate) && parsedRate > 0) {
        rate = parsedRate;
        issues.push(`自動自 Ctrl Q 工作表讀取匯率：${rate}`);
      }
    }
  }

  // ===== "I NEED" SHEET GENERATION & CATEGORY CALCULATIONS =====
  // 1. Process main BOM Sheet. We insert a column at Column L (index 11) for "乘積"
  const finalBOMHeaders = [
    "No", "階層", "料號", "規格項目-名稱說明", "UOM",
    "使用數量", "插件位置", "ERP Status", "LT",
    "是否為安規料", "單價", "乘積", "ASL狀態", "最新報價日(日/月/年)"
  ];

  const processedBOMRows = [];
  // Prepare metadata rows
  for (let r = 0; r < 11; r++) {
    const row = [...rebuilt[r]];
    // Insert empty spot at L (index 11) for metadata rows
    row.splice(11, 0, '');
    processedBOMRows.push(row);
  }

  // Re-write E2:F2 = "匯率", E3:F3 = rateValue, E4 = L10, G3 = "美金", G4 = E4/E3, G2 = Date
  // Excel indexes: Row 2 is 0-indexed 1, Row 3 is 2, Row 4 is 3. Col E is 4, Col F is 5, Col G is 6, Col L is 11.
  // We'll write values and formulas.
  processedBOMRows[1][4] = '匯率'; // E2
  processedBOMRows[2][4] = rate; // E3
  processedBOMRows[3][4] = { f: 'L10', v: 0.0 }; // E4 (Wait, in rebuilt BOM index 11 is Column L, Row 10 is 9, so total is L10!)

  processedBOMRows[1][6] = '美金'; // G2 is Date, G3 is 美金, G4 is Formula.
  // Wait, VBA writes G3 = "美金" (row 2 in excel = 0-indexed 2), G2 = Date (row 1 = 0-indexed 1), G4 = E4/E3 (row 3 = 0-indexed 3)
  processedBOMRows[1][6] = { t: 's', v: new Date().toLocaleDateString('zh-TW') }; // G2 (index 1, col G = 6)
  processedBOMRows[2][6] = '美金'; // G3 (index 2, col G = 6)
  processedBOMRows[3][6] = { f: 'E4/E3', v: 0.0 }; // G4 (index 3, col G = 6)

  // Write merged headings metadata
  processedBOMRows[8][11] = 'TOTAL:'; // L9
  processedBOMRows[9][11] = { f: 'SUBTOTAL(9,L13:L1500)', v: 0.0 }; // L10

  // Header row
  processedBOMRows.push(finalBOMHeaders); // Row 12 (0-indexed 11)

  // Data rows & Category mapping pre-calculations
  const lastRowIndex = rebuilt.length; // Row numbers in the final sheet
  const formulaLastRow = Math.max(1500, lastRowIndex);

  const bomDataPreview = [];
  const highLevelSum = {
    '1xxx 主動': 0.0, '2xxx 被動': 0.0, '3xxx 機電與保護': 0.0, '4xxx 連接器線材': 0.0,
    '5xxx 機構五金': 0.0, '6xxx 輔料與包材': 0.0, '7xxx 磁芯': 0.0, '8xxx 磁性元件': 0.0
  };
  const categoryBreakdown = {
    'DIODE': 0.0, 'IC': 0.0, 'MOS/ TR.': 0.0, 'CAP.': 0.0, 'DIP Res./Cap.': 0.0,
    'SMD Res./Cap.': 0.0, 'Magnetic': 0.0, 'PCB': 0.0, '機構件/ Other': 0.0,
    'FAN': 0.0, 'FAN GUARD': 0.0, 'CASE': 0.0, 'O/P WIRE': 0.0
  };

  let totalBOMCost = 0.0;

  for (let r = 12; r < rebuilt.length; r++) {
    const rawRow = rebuilt[r];
    const level = String(rawRow[1]).trim();
    const partNo = String(rawRow[2]).trim().toUpperCase();
    const desc = String(rawRow[3]).trim().toUpperCase();
    const qty = parseFloat(rawRow[5]) || 0;
    const overridePrice = typeof priceOverrides !== 'undefined' ? (priceOverrides[filename] || {})[partNo] : undefined;
    const price = overridePrice !== undefined ? overridePrice : (parseFloat(rawRow[10]) || 0);
    rawRow[10] = price;
    const product = qty * price;

    const row = [...rawRow];
    // Insert "乘積" cell (index 11) with Excel formula `=IFERROR(F13*K13, 0)` (excel row = index + 1)
    const excelRow = r + 1;
    row.splice(11, 0, { f: `IFERROR(F${excelRow}*K${excelRow},0)`, v: product });

    let cat = '';

    // JS-side calculations for preview and pre-populated values
    if (level !== '') {
      totalBOMCost += product;

      // 1. High level categories (1xxx to 8xxx)
      const firstChar = partNo.charAt(0);
      const hlKey = firstChar === '1' ? '1xxx 主動' :
                    firstChar === '2' ? '2xxx 被動' :
                    firstChar === '3' ? '3xxx 機電與保護' :
                    firstChar === '4' ? '4xxx 連接器線材' :
                    firstChar === '5' ? '5xxx 機構五金' :
                    firstChar === '6' ? '6xxx 輔料與包材' :
                    firstChar === '7' ? '7xxx 磁芯' :
                    firstChar === '8' ? '8xxx 磁性元件' : null;
      if (hlKey) {
        highLevelSum[hlKey] += product;
      }

      // 2. 13-category breakdown
      cat = '機構件/ Other';
      if (partNo.startsWith('1D')) {
        cat = 'DIODE';
      } else if (partNo.startsWith('1I') || partNo.startsWith('1S') || partNo.startsWith('1OT')) {
        cat = 'IC';
      } else if (partNo.startsWith('1T') || partNo.startsWith('1M')) {
        cat = 'MOS/ TR.';
      } else if (partNo.startsWith('2E') && !partNo.startsWith('2EV') && !desc.includes('SMD')) {
        cat = 'CAP.';
      } else if (['2CX', '2CY', '2EV', '2FN', '2FS', '2OP', '2VR', '3RD', '3UC', '2R'].some(p => partNo.startsWith(p)) && !desc.includes('SMD')) {
        cat = 'DIP Res./Cap.';
      } else if (partNo.startsWith('2') && desc.includes('SMD')) {
        cat = 'SMD Res./Cap.';
      } else if ((partNo.startsWith('7') || partNo.startsWith('8')) && !partNo.startsWith('8B')) {
        cat = 'Magnetic';
      } else if (partNo.startsWith('3B') || partNo.startsWith('8B')) {
        cat = 'PCB';
      } else if (desc.includes('FAN') && !desc.includes('FAN GUARD') && !partNo.startsWith('1')) {
        cat = 'FAN';
      } else if (desc.includes('FAN GUARD')) {
        cat = 'FAN GUARD';
      } else if (desc.includes('CASE') || desc.includes('CHASSIS')) {
        cat = 'CASE';
      } else if ((partNo.startsWith('4W') || desc.includes('WIRE')) && !desc.includes('GUARD')) {
        cat = 'O/P WIRE';
      }
      categoryBreakdown[cat] += product;
    }

    processedBOMRows.push(row);

    // Save for preview in web grid (with color rules applied)
    let textClass = 'text-normal-row';
    if (partNo.startsWith('8BB') || (partNo.startsWith('8B') && desc.includes('ASSEMBLY'))) {
      textClass = 'text-muted-row';
    } else if (partNo.startsWith('4W')) {
      textClass = 'text-blue-row';
    } else if (['5CC', '3FH', '5OG'].some(p => partNo.startsWith(p))) {
      textClass = 'text-orange-row';
    }

    let bgClass = '';
    if (product === 0 && !partNo.startsWith('8BB') && !(partNo.startsWith('8B') && desc.includes('ASSEMBLY'))) {
      bgClass = 'bg-yellow-row';
    }

    bomDataPreview.push({
      no: row[0],
      level: row[1],
      partNo: row[2],
      desc: row[3],
      uom: row[4],
      qty: row[5],
      location: row[6],
      status: row[7],
      lt: row[8],
      safety: row[9],
      price: row[10],
      product: product,
      asl: row[11],
      quoteDate: row[12],
      textClass,
      bgClass,
      category: cat || 'Other'
    });
  }

  // Update E4 & G4 pre-calculated values
  processedBOMRows[3][4].v = totalBOMCost;
  processedBOMRows[3][6].v = totalBOMCost / rate;
  processedBOMRows[9][11].v = totalBOMCost;

  // ===== CREATE WORKSHEET 1 (BOM) =====
  const sheet1 = XLSX.utils.aoa_to_sheet(processedBOMRows);
  
  // Set formula cell types and format patterns
  sheet1['E3'].t = 'n';
  sheet1['E3'].z = '0.00';
  sheet1['E4'].t = 'n';
  sheet1['E4'].z = '0.00';
  sheet1['G4'].t = 'n';
  sheet1['G4'].z = '0.00';
  sheet1['L10'].t = 'n';
  sheet1['L10'].z = '0.0000';
  for (let r = 12; r < rebuilt.length; r++) {
    const key = 'L' + (r + 1);
    if (sheet1[key]) {
      sheet1[key].t = 'n';
      sheet1[key].z = '0.0000';
    }
  }

  // Auto-filter
  sheet1['!autofilter'] = { ref: `A12:N${rebuilt.length}` };

  // Set column widths in Sheet 1
  sheet1['!cols'] = [
    { wch: 5 },  // A
    { wch: 5 },  // B
    { wch: 16 }, // C
    { wch: 78 }, // D
    { wch: 6 },  // E
    { wch: 10 }, // F
    { wch: 15 }, // G
    { wch: 12 }, // H
    { wch: 8 },  // I
    { wch: 14 }, // J
    { wch: 12 }, // K
    { wch: 12 }, // L (乘積)
    { wch: 12 }, // M
    { wch: 18 }  // N
  ];

  // ===== CREATE WORKSHEET 2 (大分類統計) =====
  const sheet2Rows = [
    ['大分類', '金額 (NTD)', '百分比']
  ];
  const hlKeys = Object.keys(highLevelSum);
  hlKeys.forEach((key, idx) => {
    const excelRow = idx + 2; // Data rows start at Row 2
    const digit = key.charAt(0);
    const sumifsFormula = `SUMIFS(BOM!$L$13:$L$${formulaLastRow},BOM!$C$13:$C$${formulaLastRow},"${digit}*",BOM!$B$13:$B$${formulaLastRow},"<>\")`;
    const percentageFormula = `IFERROR(B${excelRow}/$B$10,0)`;
    
    sheet2Rows.push([
      key,
      { f: sumifsFormula, v: highLevelSum[key] },
      { f: percentageFormula, v: totalBOMCost > 0 ? highLevelSum[key] / totalBOMCost : 0.0 }
    ]);
  });
  // Total row
  sheet2Rows.push([
    'Total',
    { f: 'SUM(B2:B9)', v: totalBOMCost },
    { f: 'SUM(C2:C9)', v: totalBOMCost > 0 ? 1.0 : 0.0 }
  ]);

  const sheet2 = XLSX.utils.aoa_to_sheet(sheet2Rows);
  // Set types & percentage format
  for (let idx = 2; idx <= 10; idx++) {
    sheet2['B' + idx].t = 'n';
    sheet2['C' + idx].t = 'n';
    sheet2['C' + idx].z = '0.00%';
  }
  sheet2['!cols'] = [
    { wch: 22 }, // A
    { wch: 18 }, // B
    { wch: 12 }  // C
  ];

  // ===== CREATE WORKSHEET 3 (物料拆解分析) =====
  const sheet3Rows = [
    ['項目', '金額 (NTD)', '百分比']
  ];

  const breakdownKeys = [
    'DIODE', 'IC', 'MOS/ TR.', 'CAP.', 'DIP Res./Cap.',
    'SMD Res./Cap.', 'Magnetic', 'PCB', '機構件/ Other',
    'FAN', 'FAN GUARD', 'CASE', 'O/P WIRE'
  ];

  breakdownKeys.forEach((key, idx) => {
    const excelRow = idx + 2;
    const percentageFormula = `IFERROR(B${excelRow}/$B$16,0)`;
    let formula = '';

    const rangeC = `BOM!$C$13:$C$${formulaLastRow}`;
    const rangeB = `BOM!$B$13:$B$${formulaLastRow}`;
    const rangeD = `BOM!$D$13:$D$${formulaLastRow}`;
    const rangeL = `BOM!$L$13:$L$${formulaLastRow}`;

    switch (key) {
      case 'DIODE':
        formula = `SUMPRODUCT((LEFT(${rangeC},2)="1D")*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'IC':
        formula = `SUMPRODUCT(((LEFT(${rangeC},2)="1I")+(LEFT(${rangeC},2)="1S")+(LEFT(${rangeC},3)="1OT")>0)*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'MOS/ TR.':
        formula = `SUMPRODUCT(((LEFT(${rangeC},2)="1T")+(LEFT(${rangeC},2)="1M")>0)*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'CAP.':
        formula = `SUMPRODUCT((LEFT(${rangeC},2)="2E")*(LEFT(${rangeC},3)<>"2EV")*ISERR(SEARCH("SMD",${rangeD}))*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'DIP Res./Cap.':
        formula = `SUMPRODUCT((((LEFT(${rangeC},3)="2CX")+(LEFT(${rangeC},3)="2CY")+(LEFT(${rangeC},3)="2EV")+(LEFT(${rangeC},3)="2FN")+(LEFT(${rangeC},3)="2FS")+(LEFT(${rangeC},3)="2OP")+(LEFT(${rangeC},3)="2VR")+(LEFT(${rangeC},3)="3RD")+(LEFT(${rangeC},3)="3UC")+(LEFT(${rangeC},2)="2R"))>0)*ISERR(SEARCH("SMD",${rangeD}))*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'SMD Res./Cap.':
        formula = `SUMPRODUCT((LEFT(${rangeC},1)="2")*ISNUMBER(SEARCH("SMD",${rangeD}))*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'Magnetic':
        formula = `SUMPRODUCT(((LEFT(${rangeC},1)="7")+(LEFT(${rangeC},1)="8")>0)*(LEFT(${rangeC},2)<>"8B")*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'PCB':
        formula = `SUMPRODUCT(((LEFT(${rangeC},2)="3B")+(LEFT(${rangeC},2)="8B")>0)*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'FAN':
        formula = `SUMPRODUCT(ISNUMBER(SEARCH("FAN",${rangeD}))*ISERR(SEARCH("FAN GUARD",${rangeD}))*(LEFT(${rangeC},1)<>"1")*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'FAN GUARD':
        formula = `SUMPRODUCT(ISNUMBER(SEARCH("FAN GUARD",${rangeD}))*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'CASE':
        formula = `SUMPRODUCT(((ISNUMBER(SEARCH("CASE",${rangeD})))+(ISNUMBER(SEARCH("CHASSIS",${rangeD})))>0)*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case 'O/P WIRE':
        formula = `SUMPRODUCT(((LEFT(${rangeC},2)="4W")+ISNUMBER(SEARCH("WIRE",${rangeD}))>0)*ISERR(SEARCH("GUARD",${rangeD}))*(TRIM(${rangeB})<>"")*(${rangeL}))`;
        break;
      case '機構件/ Other':
        // Sum(B2:B9) correspond to DIODE to PCB. Sum(B11:B14) correspond to FAN to WIRE.
        formula = `SUMPRODUCT((TRIM(${rangeB})<>"")*(${rangeL}))-SUM(B2:B9)-SUM(B11:B14)`;
        break;
    }

    sheet3Rows.push([
      key,
      { f: formula, v: categoryBreakdown[key] },
      { f: percentageFormula, v: totalBOMCost > 0 ? categoryBreakdown[key] / totalBOMCost : 0.0 }
    ]);
  });
  // Total row
  sheet3Rows.push([
    'Total',
    { f: 'SUM(B2:B14)', v: totalBOMCost },
    { f: 'SUM(C2:C14)', v: totalBOMCost > 0 ? 1.0 : 0.0 }
  ]);

  const sheet3 = XLSX.utils.aoa_to_sheet(sheet3Rows);
  // Set types & percentage format
  for (let idx = 2; idx <= 15; idx++) {
    sheet3['B' + idx].t = 'n';
    sheet3['C' + idx].t = 'n';
    sheet3['C' + idx].z = '0.00%';
  }
  sheet3['!cols'] = [
    { wch: 22 }, // A
    { wch: 18 }, // B
    { wch: 12 }  // C
  ];

  // ===== APPLY STYLES =====
  applyStylesToSheet(sheet1, 'BOM');
  applyStylesToSheet(sheet2, 'HL');
  applyStylesToSheet(sheet3, 'Breakdown');

  // ===== PACK WORKBOOK =====
  const newWb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWb, sheet1, 'BOM');
  XLSX.utils.book_append_sheet(newWb, sheet2, '大分類統計');
  XLSX.utils.book_append_sheet(newWb, sheet3, '物料拆解分析');

  return {
    filename,
    status: needsFix ? 'fixed' : 'raw_normal',
    fixedWb: newWb,
    issues: needsFix ? issues : ['格式正常，已完成BOM解析。'],
    fixLog,
    bomData: bomDataPreview,
    highLevelSummary: highLevelSum,
    categoryBreakdown: categoryBreakdown,
    totalBOMCost: totalBOMCost,
    modelNumber,
    version
  };
}

/* ======== UI RENDERING AND UPDATE ======== */

// Helper: highlight the common prefix between two part numbers in blue
function highlightCommonPrefix(recPartNo, targetPartNo) {
  var r = recPartNo.toUpperCase();
  var t = targetPartNo.toUpperCase();
  var commonLen = 0;
  var minLen = Math.min(r.length, t.length);
  for (var i = 0; i < minLen; i++) {
    if (r[i] === t[i]) commonLen++;
    else break;
  }
  if (commonLen < 6) {
    return escHtml(recPartNo);
  }
  return '<span style="color:#3b82f6;font-weight:700">' + escHtml(recPartNo.slice(0, commonLen)) + '</span>' + escHtml(recPartNo.slice(commonLen));
}

// Helper: render HTML for the missing price analysis tab rows
function renderMissingRowsHtml(missingItems, fileIdx, filename) {
  return missingItems.map(function(item) {
    var rec = findRecommendation(item.partNo, filename);
    var recPartNoHtml = '';
    var recHtml = '';
    if (rec) {
      var typeLabel = rec.type === 'exact' ? '精確' : ('相似 (' + rec.score + ' 碼)');
      var badgeClass = rec.type === 'exact' ? 'missing-rec-badge' : 'missing-rec-badge similar';
      recPartNoHtml = highlightCommonPrefix(rec.partNo, item.partNo);
      recHtml =
        '<span class="' + badgeClass + '">' +
          '$' + rec.price + ' [' + typeLabel + ' - 來自 ' + escHtml(rec.filename) + ']' +
        '</span>' +
        '<button class="btn-apply-rec" onclick="setPriceOverride(' + fileIdx + ',\'' + item.partNo + '\',' + rec.price + ')">套用</button>';
    } else {
      recPartNoHtml = '<span style="color:var(--text-muted)">—</span>';
      recHtml = '<span style="color: var(--text-muted);">無推薦價格</span>';
    }
    var overrideVal = ((priceOverrides[filename] || {})[item.partNo] !== undefined)
      ? (priceOverrides[filename] || {})[item.partNo]
      : '';
    return '<tr>' +
      '<td class="bold">' + escHtml(item.level) + '</td>' +
      '<td class="bold">' + escHtml(item.partNo) + '</td>' +
      '<td title="' + escHtml(item.desc) + '">' + escHtml(item.desc) + '</td>' +
      '<td class="txt-right">' + item.qty + '</td>' +
      '<td class="bold" style="font-size:0.82rem">' + recPartNoHtml + '</td>' +
      '<td>' + recHtml + '</td>' +
      '<td class="txt-right">' +
        '<input type="number" step="0.01" min="0" placeholder="未輸入" class="override-input" ' +
        'value="' + overrideVal + '" onchange="setPriceOverride(' + fileIdx + ',\'' + item.partNo + '\',this.value)" />' +
      '</td>' +
      '</tr>';
  }).join('');
}

// One-click apply all smart recommendations across all loaded BOMs
function applyAllRecommendations() {
  var applied = 0;
  results.forEach(function(r, idx) {
    if (r.status === 'error' || !r.bomData) return;
    var filename = r.filename;
    r.bomData.forEach(function(item) {
      var p = (item.partNo || '').toUpperCase();
      var d = (item.desc || '').toUpperCase();
      var lvl = String(item.level || '').trim();
      var isAssembly = p.startsWith('8BB') || (p.startsWith('8B') && d.includes('ASSEMBLY'));
      if (lvl === '' || item.price !== 0 || isAssembly) return;
      // Skip if already overridden
      if ((priceOverrides[filename] || {})[item.partNo] !== undefined) return;
      var rec = findRecommendation(item.partNo, filename);
      if (rec) {
        if (!priceOverrides[filename]) priceOverrides[filename] = {};
        priceOverrides[filename][item.partNo] = rec.price;
        applied++;
      }
    });
  });
  if (applied > 0) recalculateAll();
  updateApplyAllBtn();
}

// Show/hide the one-click apply button based on whether any unpriced items have recommendations
function updateApplyAllBtn() {
  var btn = document.getElementById('btnApplyAll');
  if (!btn) return;
  var hasAny = results.some(function(r) {
    if (r.status === 'error' || !r.bomData) return false;
    return r.bomData.some(function(item) {
      var p = (item.partNo || '').toUpperCase();
      var d = (item.desc || '').toUpperCase();
      var lvl = String(item.level || '').trim();
      var isAssembly = p.startsWith('8BB') || (p.startsWith('8B') && d.includes('ASSEMBLY'));
      if (lvl === '' || item.price !== 0 || isAssembly) return false;
      if ((priceOverrides[r.filename] || {})[item.partNo] !== undefined) return false;
      return findRecommendation(item.partNo, r.filename) !== null;
    });
  });
  btn.style.display = hasAny ? 'flex' : 'none';
}

function updateDashboard() {
  const total = results.length;
  const processed = results.filter(r => r.status === 'processed').length;
  const fixed = results.filter(r => r.status === 'fixed').length;
  const normal = results.filter(r => r.status === 'raw_normal').length;
  const err = results.filter(r => r.status === 'error').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statProcessed').textContent = processed;
  document.getElementById('statFixed').textContent = fixed;
  document.getElementById('statNormal').textContent = normal;
  document.getElementById('statError').textContent = err;

  const downloadables = results.filter(r => {
    if (r.status === 'error') return false;
    if (r.status === 'processed' && skipProcessedInput.checked) return false;
    return true;
  });

  btnDownload.disabled = downloadables.length === 0;
  updateApplyAllBtn();
}

function renderResults() {
  fileList.innerHTML = '';
  if (results.length === 0) return;

  results.forEach((r, idx) => {
    const card = document.createElement('div');
    card.className = 'file-card';

    let badgeClass = 'badge-error';
    let badgeText = '❌ 錯誤';
    let icon = '⚠️';

    if (r.status === 'processed') {
      badgeClass = 'badge-processed';
      badgeText = '📋 已整理(略過)';
      icon = '📄';
    } else if (r.status === 'fixed') {
      badgeClass = 'badge-fixed';
      badgeText = '🔧 已修正格式';
      icon = '🔧';
    } else if (r.status === 'raw_normal') {
      badgeClass = 'badge-normal';
      badgeText = '✅ 原始規格正常';
      icon = '✨';
    }

    let issuesHtml = r.issues.map(iss => `<span>${escHtml(iss)}</span>`).join('');

    let cardHtml = `
      <div class="file-header">
        <div class="file-name">${icon} ${escHtml(r.filename)}</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="file-meta">${issuesHtml}</div>
    `;

    const missingItems = (r.status === 'error') ? [] : r.bomData.filter(item => {
      const p = (item.partNo || '').toUpperCase();
      const d = (item.desc || '').toUpperCase();
      const lvl = String(item.level || '').trim();
      const isAssembly = p.startsWith('8BB') || (p.startsWith('8B') && d.includes('ASSEMBLY'));
      return lvl !== '' && item.price === 0 && !isAssembly;
    });

    if (r.status !== 'error') {

function toggleDetail(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    btn.textContent = btn.textContent.replace('▶', '▼');
  } else {
    el.classList.add('hidden');
    btn.textContent = btn.textContent.replace('▼', '▶');
  }
}

function switchCardTab(e, detailId, tabName) {
  const target = e.currentTarget || e.target || e;
  if (!target) return;
  // Deactivate all tab buttons in this card
  const container = target.parentElement;
  if (container) {
    container.querySelectorAll('.card-tab').forEach(btn => btn.classList.remove('active'));
  }
  target.classList.add('active');

  // Hide all tab contents in this card
  const cardBody = document.getElementById(detailId);
  if (cardBody) {
    cardBody.querySelectorAll('.tab-content').forEach(cont => cont.classList.add('hidden'));
  }

  // Show selected tab content
  const targetContent = document.getElementById(`${detailId}-${tabName}`);
  if (targetContent) {
    targetContent.classList.remove('hidden');
  }
}

/* ======== ZIP DOWNLOAD GENERATOR ======== */
async function downloadZip() {
  const zip = new JSZip();
  let fileAddedCount = 0;

  const missingDataRows = [];
  missingDataRows.push([
    '載入檔案的名稱', 'No', '階層', '料號', '規格項目-名稱說明', 'UOM',
    '使用數量', '插件位置', 'ERP Status', 'LT', '是否為安規料', '單價',
    'ASL狀態', '最新報價日(日/月/年)'
  ]);

  for (const r of results) {
    if (r.status === 'error') continue;
    if (r.status === 'processed' && skipProcessedInput.checked) continue;

    // Output filename rules: raw name without extension + .xlsx
    const rawName = r.filename;
    const baseName = rawName.includes('.') ? rawName.split('.').slice(0, -1).join('.') : rawName;
    const outName = `${baseName}.xlsx`;

    try {
      const outData = XLSX.write(r.fixedWb, { bookType: 'xlsx', type: 'array' });
      zip.file(outName, outData);
      fileAddedCount++;
    } catch (e) {
      alert(`寫入檔案失敗: ${r.filename}, 錯誤: ${e.message}`);
    }

    // Collect missing price active components from this file
    const fileMissingItems = r.bomData.filter(item => {
      const p = (item.partNo || '').toUpperCase();
      const d = (item.desc || '').toUpperCase();
      const lvl = String(item.level || '').trim();
      const isAssembly = p.startsWith('8BB') || (p.startsWith('8B') && d.includes('ASSEMBLY'));
      return lvl !== '' && item.price === 0 && !isAssembly;
    });

    fileMissingItems.forEach(item => {
      missingDataRows.push([
        baseName,
        item.no ?? '',
        item.level ?? '',
        item.partNo ?? '',
        item.desc ?? '',
        item.uom ?? '',
        item.qty ?? 0,
        item.location ?? '',
        item.status ?? '',
        item.lt ?? '',
        item.safety ?? '',
        item.price ?? 0,
        item.asl ?? '',
        item.quoteDate ?? ''
      ]);
    });
  }

  if (fileAddedCount === 0) {
    alert('無可下載的檔案！');
    return;
  }

  // Create Missing Price List.xlsx if there are missing items
  if (missingDataRows.length > 1) {
    try {
      const missingSheet = XLSX.utils.aoa_to_sheet(missingDataRows);
      
      // Auto-fit column widths
      missingSheet['!cols'] = [
        { wch: 30 }, // 載入檔案的名稱
        { wch: 6 },  // No
        { wch: 6 },  // 階層
        { wch: 16 }, // 料號
        { wch: 50 }, // 規格項目-名稱說明
        { wch: 6 },  // UOM
        { wch: 10 }, // 使用數量
        { wch: 15 }, // 插件位置
        { wch: 12 }, // ERP Status
        { wch: 8 },  // LT
        { wch: 14 }, // 是否為安規料
        { wch: 10 }, // 單價
        { wch: 12 }, // ASL狀態
        { wch: 18 }  // 最新報價日(日/月/年)
      ];

      // Format unit price cells (Column L is index 11) as numbers
      for (let r = 1; r < missingDataRows.length; r++) {
        const cellRef = 'L' + (r + 1);
        if (missingSheet[cellRef]) {
          missingSheet[cellRef].t = 'n';
          missingSheet[cellRef].z = '0.00';
        }
      }

      // Apply premium fonts and styles
      const hasChinese = /[\u4e00-\u9fa5]/;
      for (const cellAddress in missingSheet) {
        if (cellAddress.startsWith('!')) continue;
        const cell = missingSheet[cellAddress];
        if (!cell) continue;
        const match = cellAddress.match(/^([A-Z]+)([0-9]+)$/);
        if (match) {
          const rowNum = parseInt(match[2], 10);
          let fontName = 'Arial';
          if (cell.v !== undefined && cell.v !== null && hasChinese.test(String(cell.v))) {
            fontName = 'Microsoft JhengHei';
          }
          if (rowNum === 1) {
            cell.s = {
              font: {
                name: fontName,
                sz: 10,
                bold: true,
                color: { rgb: '000000' }
              }
            };
          } else {
            cell.s = {
              font: {
                name: fontName,
                sz: 10,
                color: { rgb: '000000' }
              }
            };
          }
        }
      }

      const missingWb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(missingWb, missingSheet, 'Missing Prices');
      const missingOutData = XLSX.write(missingWb, { bookType: 'xlsx', type: 'array' });
      zip.file('Missing Price List.xlsx', missingOutData);
    } catch (err) {
      alert('建立缺價格主料清單失敗: ' + err.message);
    }
  }

  try {
    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = `BOM_I_need_Fixed_Pack_${new Date().toISOString().slice(0, 10)}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('壓縮 ZIP 失敗: ' + err.message);
  }
}

/* ======== HELPERS ======== */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
